name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate JSON
        run: python scripts/validate.py

      - name: Build catalog
        run: python scripts/build_catalog.py

      - name: Validate generated JSON
        run: python scripts/validate.py
