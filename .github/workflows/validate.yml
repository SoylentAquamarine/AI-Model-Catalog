name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validation dependency
        run: pip install jsonschema

      - name: Validate committed files
        run: python scripts/validate.py

      - name: Rebuild catalog index
        run: python scripts/build_catalog.py

      - name: Validate rebuilt output
        run: python scripts/validate.py
