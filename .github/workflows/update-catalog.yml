name: Update Catalog

on:
  # Manual run from the Actions tab.
  workflow_dispatch:
  # Weekly refresh: Sundays 06:00 UTC.
  schedule:
    - cron: '0 6 * * 0'
  # External trigger, e.g. a provider announcement email forwarded through an
  # automation that calls the GitHub API. See docs/EMAIL-TRIGGERS.md.
  repository_dispatch:
    types: [provider-announcement]

permissions:
  contents: write
  issues: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validation dependency
        run: pip install jsonschema

      - name: Record provider announcement
        if: github.event_name == 'repository_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const p = context.payload.client_payload || {};
            const provider = p.provider || 'unknown';
            const subject = p.subject || '(no subject)';
            const body = [
              'A provider announcement triggered a catalog update run.',
              '',
              `- provider: ${provider}`,
              `- subject: ${subject}`,
              `- from: ${p.from || 'unknown'}`,
              `- received: ${p.received || 'unknown'}`,
              '',
              p.summary ? `Announcement summary:\n\n${p.summary}\n` : '',
              `Update run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Review the diff committed by this run and curate anything the updaters cannot see (pricing changes, deprecations, new capabilities).',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Provider announcement: ${provider} - ${subject}`,
              body,
            });

      # One step per provider, each tolerant of that provider's outage:
      # a failed updater keeps the existing file and the rest still update.
      # Missing keys are a clean skip inside the script itself.

      - name: Update openrouter (public, no key)
        continue-on-error: true
        run: python scripts/update_openrouter.py

      - name: Update pollinations (public, no key)
        continue-on-error: true
        run: python scripts/update_pollinations.py

      - name: Update openai
        continue-on-error: true
        env:
          OPENAI_API_KEY_FREE: ${{ secrets.OPENAI_API_KEY_FREE }}
        run: python scripts/update_openai.py

      - name: Update anthropic
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY_FREE: ${{ secrets.ANTHROPIC_API_KEY_FREE }}
        run: python scripts/update_anthropic.py

      - name: Update gemini
        continue-on-error: true
        env:
          GEMINI_API_KEY_FREE: ${{ secrets.GEMINI_API_KEY_FREE }}
        run: python scripts/update_gemini.py

      - name: Update groq
        continue-on-error: true
        env:
          GROQ_API_KEY_FREE: ${{ secrets.GROQ_API_KEY_FREE }}
        run: python scripts/update_groq.py

      - name: Update mistral
        continue-on-error: true
        env:
          MISTRAL_API_KEY_FREE: ${{ secrets.MISTRAL_API_KEY_FREE }}
        run: python scripts/update_mistral.py

      - name: Update together
        continue-on-error: true
        env:
          TOGETHER_API_KEY_FREE: ${{ secrets.TOGETHER_API_KEY_FREE }}
        run: python scripts/update_together.py

      - name: Update cohere
        continue-on-error: true
        env:
          COHERE_API_KEY_FREE: ${{ secrets.COHERE_API_KEY_FREE }}
        run: python scripts/update_cohere.py

      - name: Update cerebras
        continue-on-error: true
        env:
          CEREBRAS_API_KEY_FREE: ${{ secrets.CEREBRAS_API_KEY_FREE }}
        run: python scripts/update_cerebras.py

      - name: Update deepseek
        continue-on-error: true
        env:
          DEEPSEEK_API_KEY_FREE: ${{ secrets.DEEPSEEK_API_KEY_FREE }}
        run: python scripts/update_deepseek.py

      - name: Update fireworks
        continue-on-error: true
        env:
          FIREWORKS_API_KEY_FREE: ${{ secrets.FIREWORKS_API_KEY_FREE }}
        run: python scripts/update_fireworks.py

      - name: Update sambanova
        continue-on-error: true
        env:
          SAMBANOVA_API_KEY_FREE: ${{ secrets.SAMBANOVA_API_KEY_FREE }}
        run: python scripts/update_sambanova.py

      - name: Update huggingface
        continue-on-error: true
        env:
          HUGGINGFACE_API_KEY_FREE: ${{ secrets.HUGGINGFACE_API_KEY_FREE }}
        run: python scripts/update_huggingface.py

      - name: Update cloudflare
        continue-on-error: true
        env:
          CLOUDFLARE_API_KEY_FREE: ${{ secrets.CLOUDFLARE_API_KEY_FREE }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python scripts/update_cloudflare.py

      - name: Update ollama (local runtime, contract only)
        continue-on-error: true
        run: python scripts/update_ollama.py

      # Build and validation stay strict: broken output must never publish.

      - name: Build catalog index
        run: python scripts/build_catalog.py

      - name: Validate
        run: python scripts/validate.py

      - name: Commit catalog updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update provider model catalog
          file_pattern: 'providers/*.json catalog-index.json'
